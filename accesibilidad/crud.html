<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mi biblioteca</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="crud.css">
</head>

<body>

    <header class="container">
        <div class="d-flex align-items-center">
            <!-- Imagen junto al texto -->
            <img src="libros.jpg" alt="Libros" class="me-3" style="width: 50px; height: 50px;"> <!-- Non-text Content (A)-->
            <h1>Mis libros</h1>
        </div>
    </header>

    <main class="container">

            <form>
                <fieldset>
                    <legend>Información del libro</legend>
                    
                    <div class="mb-3">
                        <label class="form-label" for="NombreLibro">Nombre del libro</label>
                        <input type="text" class="form-control" id="NombreLibro" placeholder="Favor de llenar el campo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="AutorLibro">Autor del libro</label>
                        <input type="text" class="form-control" id="AutorLibro" placeholder="Favor de llenar el campo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="DescripcionLibro">Descripción del libro</label>
                        <textarea class="form-control" id="DescripcionLibro" rows="3"
                            placeholder="Favor de llenar el campo"></textarea>
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="FechaInicio">Fecha de inicio</label>
                        <input type="date" class="form-control" id="FechaInicio" placeholder="Favor de llenar el campo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="FechaTermino">Fecha de termino</label>
                        <input type="date" class="form-control" id="FechaTermino" placeholder="Favor de llenar el campo">
                    </div>

                    <div class="mb-3">
                        <label class="form-label" for="Calificacion">Calificación</label>
                        <input type="number" class="form-control" id="Calificacion" placeholder="Se califica del 1 al 5">
                    </div>

                    <button type="button" class="btn btn-primary" id="Button" onclick="AddData()">Subir datos</button>
                </fieldset>
            </form>
<br>

        <section>
            <h2>Lista de libros</h2>
            <table class="table table-bordered" id="tableData">
                <thead>
                    <tr>
                        <th scope="col">Nombre</th>
                        <th scope="col">Autor</th>
                        <th scope="col">Descripción</th>
                        <th scope="col">Fecha inicio</th>
                        <th scope="col">Fecha termino</th>
                        <th scope="col">Calificación</th>
                        <th scope="col">Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Aquí se llenarán los datos enlazado a js -->
                </tbody>
            </table>
        </section>

    </main>

    <footer class="container">
        <p>&copy; 2024 Mi Biblioteca Personal</p>
    </footer>

    <script src="crud.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
</body>

</html>
